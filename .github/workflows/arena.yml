name: BIST AI Arena döngüsü

on:
  # ZAMANLAMA: GitHub'ın içsel cron'u bu repoda güvenilir ateşlemiyor.
  # Bunun yerine claude.ai bulut rutinleri (Anthropic zamanlayıcı) hafta içi
  # İstanbul 10:07-18:07 arası :07 ve :37'de bu iş akışını tetikler
  # (gh workflow run -> workflow_dispatch). GitHub Actions tüm secret'larıyla
  # (DeepSeek LLM, SMTP) asıl döngüyü çalıştırır.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: arena-cycle
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Orchestrator döngüsü
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ARENA_SMTP_HOST: smtp.gmail.com
          ARENA_SMTP_PORT: '587'
          ARENA_SMTP_USER: can.otu@gmail.com
          ARENA_MAIL_TO: can.otu@erlau.com.tr
          ARENA_SMTP_PASS: ${{ secrets.ARENA_SMTP_PASS }}
        run: python3 orchestrator/run.py

      - name: Hata bildirimi (döngü çökerse e-posta)
        if: failure()
        env:
          ARENA_SMTP_HOST: smtp.gmail.com
          ARENA_SMTP_PORT: '587'
          ARENA_SMTP_USER: can.otu@gmail.com
          ARENA_MAIL_TO: can.otu@erlau.com.tr
          ARENA_SMTP_PASS: ${{ secrets.ARENA_SMTP_PASS }}
        run: |
          python3 -c "from orchestrator import notify; notify.send('BIST AI Arena: GitHub Actions dongusu BASARISIZ oldu (UTC $(date -u +%FT%H:%M)). Actions loglarina bakin.')"

      - name: Değişiklikleri commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Değişiklik yok, commit atlanıyor."
          else
            git commit -m "arena: otomatik döngü (UTC $(date -u +%Y-%m-%dT%H:%M))"
            git push
          fi
